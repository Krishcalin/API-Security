# Intentionally vulnerable nginx config for API Security Scanner testing

upstream api_backend {
    server 127.0.0.1:5000;
    server 127.0.0.1:5001;
}

server {
    listen 80;
    server_name api.example.com;

    # API-GW-001: proxy_pass without rate limiting
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin/ {
        proxy_pass http://api_backend;
    }

    # API8-001: CORS wildcard
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods *;

    # API8-006: Server version exposed
    add_header X-Powered-By "nginx/1.24.0";
    add_header Server "nginx/1.24.0";

    # API-TLS-001: HTTP endpoint
    # No SSL/TLS configuration — serving over HTTP

    # API8-002: Debug mode
    # Debug enabled for troubleshooting
}
