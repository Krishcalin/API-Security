<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="400" fill="url(#grid)" rx="12"/>

  <!-- Network connection lines -->
  <g opacity="0.15" stroke="#fff" stroke-width="1">
    <line x1="80" y1="80" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="150" y2="280"/>
    <line x1="200" y1="150" x2="320" y2="100"/>
    <line x1="320" y1="100" x2="280" y2="250"/>
    <line x1="1000" y1="90" x2="1100" y2="180"/>
    <line x1="1100" y1="180" x2="1050" y2="300"/>
    <line x1="1100" y1="180" x2="1150" y2="120"/>
    <line x1="900" y1="320" x2="1050" y2="300"/>
  </g>

  <!-- Network dots -->
  <g fill="rgba(255,255,255,0.2)">
    <circle cx="80" cy="80" r="4"/><circle cx="200" cy="150" r="5"/>
    <circle cx="150" cy="280" r="3"/><circle cx="320" cy="100" r="4"/>
    <circle cx="280" cy="250" r="3"/><circle cx="1000" cy="90" r="4"/>
    <circle cx="1100" cy="180" r="5"/><circle cx="1050" cy="300" r="3"/>
    <circle cx="1150" cy="120" r="3"/><circle cx="900" cy="320" r="4"/>
  </g>

  <!-- Shield icon with API lock -->
  <g transform="translate(140, 110) scale(1.4)" filter="url(#glow)">
    <path d="M50 10 L90 30 L90 70 C90 100 50 120 50 120 C50 120 10 100 10 70 L10 30 Z"
          fill="url(#shield)" opacity="0.9" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <!-- Lock icon -->
    <rect x="35" y="58" width="30" height="24" rx="3" fill="rgba(0,0,0,0.3)" stroke="#fff" stroke-width="1.5"/>
    <path d="M40 58 L40 48 C40 38 60 38 60 48 L60 58" fill="none" stroke="#fff" stroke-width="2"/>
    <circle cx="50" cy="70" r="3" fill="#fff"/>
    <!-- API text on shield -->
    <text x="50" y="42" fill="#fff" font-family="monospace" font-size="16" font-weight="800" text-anchor="middle">API</text>
  </g>

  <!-- Main title -->
  <text x="600" y="140" fill="#ffffff" font-family="'Segoe UI',system-ui,sans-serif" font-size="68"
        font-weight="800" text-anchor="middle" letter-spacing="-1" filter="url(#titleGlow)">API Security Scanner</text>

  <!-- Subtitle -->
  <text x="600" y="185" fill="rgba(224,231,255,0.9)" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="22" font-weight="600" text-anchor="middle">Discovery, Vulnerability &amp; Misconfiguration Management</text>

  <!-- Tagline -->
  <text x="600" y="222" fill="rgba(196,210,255,0.7)" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="16" text-anchor="middle">Zero-dependency Python SAST scanner for REST, GraphQL, gRPC &amp; API Gateway security</text>

  <!-- Feature badges -->
  <g transform="translate(600, 260)" text-anchor="middle">
    <g transform="translate(-400, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text y="5" fill="#fff" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600">OWASP API T10</text>
    </g>
    <g transform="translate(-235, 0)">
      <rect x="-55" y="-14" width="110" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text y="5" fill="#fff" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600">PCI-DSS v4.0</text>
    </g>
    <g transform="translate(-70, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text y="5" fill="#fff" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600">GDPR</text>
    </g>
    <g transform="translate(70, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text y="5" fill="#fff" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600">HIPAA</text>
    </g>
    <g transform="translate(235, 0)">
      <rect x="-45" y="-14" width="90" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text y="5" fill="#fff" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600">DORA</text>
    </g>
    <g transform="translate(400, 0)">
      <rect x="-60" y="-14" width="120" height="28" rx="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <text y="5" fill="#fff" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" font-weight="600">100+ Rules</text>
    </g>
  </g>

  <!-- Protocol badges row -->
  <g transform="translate(600, 310)" text-anchor="middle">
    <g transform="translate(-250, 0)">
      <rect x="-40" y="-12" width="80" height="24" rx="12" fill="rgba(14,165,233,0.3)" stroke="rgba(56,189,248,0.5)" stroke-width="1"/>
      <text y="4" fill="#38bdf8" font-family="monospace" font-size="13" font-weight="700">REST</text>
    </g>
    <g transform="translate(-120, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="rgba(14,165,233,0.3)" stroke="rgba(56,189,248,0.5)" stroke-width="1"/>
      <text y="4" fill="#38bdf8" font-family="monospace" font-size="13" font-weight="700">GraphQL</text>
    </g>
    <g transform="translate(10, 0)">
      <rect x="-35" y="-12" width="70" height="24" rx="12" fill="rgba(14,165,233,0.3)" stroke="rgba(56,189,248,0.5)" stroke-width="1"/>
      <text y="4" fill="#38bdf8" font-family="monospace" font-size="13" font-weight="700">gRPC</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="-45" y="-12" width="90" height="24" rx="12" fill="rgba(14,165,233,0.3)" stroke="rgba(56,189,248,0.5)" stroke-width="1"/>
      <text y="4" fill="#38bdf8" font-family="monospace" font-size="13" font-weight="700">OpenAPI</text>
    </g>
    <g transform="translate(250, 0)">
      <rect x="-50" y="-12" width="100" height="24" rx="12" fill="rgba(14,165,233,0.3)" stroke="rgba(56,189,248,0.5)" stroke-width="1"/>
      <text y="4" fill="#38bdf8" font-family="monospace" font-size="13" font-weight="700">Protobuf</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="360" width="1200" height="40" rx="0" fill="rgba(0,0,0,0.2)"/>
  <text x="600" y="385" fill="rgba(255,255,255,0.5)" font-family="'Segoe UI',system-ui,sans-serif"
        font-size="13" text-anchor="middle">Python 3.10+ | No Dependencies | Console + JSON + HTML Reports | CI/CD Ready</text>
</svg>
